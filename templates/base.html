<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Hospital Order System{% endblock %}</title>
</head>

<body>
  <header>
    <h1>Hospital Order System</h1>

    {% if user.is_authenticated %}
      <p>
        Logged in as <strong>{{ user.username }}</strong>
      </p>

      <nav>
        <a href="{% url 'order_list' %}">Orders</a>
        |
        <a href="{% url 'order_create' %}">New Order</a>
        |
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
          {% csrf_token %}
          <button type="submit">Logout</button>
        </form>
      </nav>
    {% endif %}

    <hr>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>
</body>
</html>
