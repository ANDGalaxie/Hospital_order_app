{% extends "base.html" %}

{% block title %}New Order - Hospital Order System{% endblock %}

{% block content %}
  <h2>New Order</h2>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Save Order</button>
  </form>

  <p>
    <a href="{% url 'order_list' %}">Back to orders</a>
  </p>
{% endblock %}
