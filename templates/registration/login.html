<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Hospital Order System</title>
</head>

<body>
  <h1>Hospital Order System</h1>
  <h2>Login</h2>

  {% if form.errors %}
    <p style="color: red;">
      Invalid username or password.
    </p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Login</button>
  </form>
</body>
</html>
